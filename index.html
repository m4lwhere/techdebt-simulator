<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0d0d14" />
    <title>Technical Debt Simulator — kick the can, ride the line</title>
    <meta
      name="description"
      content="A fast, satirical mobile web game. Ship features, hoard technical debt as leverage, fight career-stage bosses, and collapse spectacularly."
    />

    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="canonical" href="https://m4lwhere.github.io/techdebt-simulator/" />

    <!-- Social preview cards. NOTE: og:url and og:image MUST be absolute URLs.
         When your custom domain goes live, swap the host in the 4 URLs below. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Technical Debt Simulator" />
    <meta property="og:title" content="Technical Debt Simulator" />
    <meta
      property="og:description"
      content="Kick the can. Ride the line. Collapse spectacularly. A satirical mobile web game."
    />
    <meta property="og:url" content="https://m4lwhere.github.io/techdebt-simulator/" />
    <meta property="og:image" content="https://m4lwhere.github.io/techdebt-simulator/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Technical Debt Simulator" />
    <meta
      name="twitter:description"
      content="Kick the can. Ride the line. Collapse spectacularly."
    />
    <meta name="twitter:image" content="https://m4lwhere.github.io/techdebt-simulator/og.png" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0d0d14;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
        font-family: system-ui, -apple-system, sans-serif;
      }
      /* Pinned to the real visible viewport by JS (see main.ts). No flexbox
         centering here — Phaser's Scale.CENTER_BOTH handles canvas placement,
         and a second layer of centering throws off touch coordinates. */
      #app {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #app canvas { display: block; }

      /* Shown only on non-phone devices (see script at end of body). */
      #device-warning {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
        background: #0d0d14;
        padding: 24px;
        box-sizing: border-box;
      }
      #device-warning .card { max-width: 440px; text-align: center; }
      #device-warning .emoji { font-size: 68px; line-height: 1; margin-bottom: 10px; }
      #device-warning h1 { color: #ff9f43; font-size: 24px; font-weight: 800; margin: 0 0 14px; }
      #device-warning p { color: #9a9ab0; font-size: 15px; line-height: 1.55; margin: 0 0 10px; }
      #device-warning .scan {
        color: #cfcfe0;
        font-size: 14px;
        font-weight: 700;
        margin: 18px 0 8px;
      }
      #device-warning .qr {
        width: 200px;
        height: 200px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 12px;
        padding: 10px;
        box-sizing: border-box;
      }
      #device-warning .qr img { width: 100%; height: 100%; display: block; }
      #device-warning .url {
        margin-top: 14px;
        font-size: 13px;
        color: #5a5a70;
        word-break: break-all;
      }
      #device-warning button {
        margin-top: 20px;
        background: #ff9f43;
        color: #0d0d14;
        border: none;
        border-radius: 10px;
        padding: 13px 24px;
        font: 700 16px system-ui, sans-serif;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="device-warning">
      <div class="card">
        <div class="emoji">📱</div>
        <h1>Best played on a phone</h1>
        <p>
          Technical Debt Simulator is built for mobile (portrait). On a desktop or
          large screen it’ll look stretched and play rough.
        </p>
        <p>For the real experience, open this page on your phone.</p>
        <p class="scan">📷 Scan to play on your phone</p>
        <div class="qr">
          <img src="./qr.png" width="660" height="660" alt="QR code linking to the game" />
        </div>
        <div class="url" id="dw-url"></div>
        <button id="dw-dismiss">Play anyway on this screen</button>
      </div>
    </div>

    <script>
      // Phone = a touch (coarse) pointer on a small screen. Anything else gets
      // a friendly heads-up that it's designed for phones.
      (function () {
        var coarse = window.matchMedia('(pointer: coarse)').matches;
        var smallSide = Math.min(window.innerWidth, window.innerHeight);
        var isPhone = coarse && smallSide <= 540;
        if (isPhone) return;
        var w = document.getElementById('device-warning');
        w.style.display = 'flex';
        var u = document.getElementById('dw-url');
        if (u) u.textContent = location.href;
        document.getElementById('dw-dismiss').addEventListener('click', function () {
          w.style.display = 'none';
        });
      })();
    </script>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
